version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: zorvyn-finance-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: zorvyn
      POSTGRES_PASSWORD: zorvyn_secret
      POSTGRES_DB: finance_dashboard
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
